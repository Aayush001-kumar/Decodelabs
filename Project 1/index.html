<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Finance Dashboard</title>

    <link rel="stylesheet" href="style.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <header class="header">
      <div class="logo">
        <h1>💰 Finance Dashboard</h1>
      </div>

      <button id="themeToggle" class="theme-btn">🌙</button>
    </header>

    <main class="container">
      <section class="summary">
        <div class="card balance-card">
          <h3>Current Balance</h3>
          <h2 id="balance">₹0.00</h2>
        </div>

        <div class="card income-card">
          <h3>Total Income</h3>
          <h2 id="income">₹0.00</h2>
        </div>

        <div class="card expense-card">
          <h3>Total Expenses</h3>
          <h2 id="expense">₹0.00</h2>
        </div>
      </section>

      <section class="card form-card">
        <h2>Add Transaction</h2>

        <form id="transactionForm">
          <input
            type="text"
            id="description"
            placeholder="Description"
            required
          />

          <input type="number" id="amount" placeholder="Amount" required />

          <select id="type">
            <option value="income">Income</option>
            <option value="expense">Expense</option>
          </select>

          <select id="category">
            <option value="Salary">Salary</option>
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Shopping">Shopping</option>
            <option value="Bills">Bills</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Other">Other</option>
          </select>

          <button type="submit" class="add-btn">Add Transaction</button>
        </form>
      </section>

      <section class="card search-card">
        <input
          type="text"
          id="searchInput"
          placeholder="🔍 Search transactions..."
        />
      </section>

      <section class="card transactions-card">
        <div class="section-header">
          <h2>Recent Transactions</h2>
        </div>

        <ul id="transactionList"></ul>
      </section>

      <section class="card insights-card">
        <h2>Monthly Spending Overview</h2>

        <div class="progress-group">
          <div class="progress-item">
            <div class="progress-label">
              <span>Food</span>
              <span id="foodAmount">₹0</span>
            </div>

            <div class="progress-bar">
              <div class="progress-fill food-fill"></div>
            </div>
          </div>

          <div class="progress-item">
            <div class="progress-label">
              <span>Transport</span>
              <span id="transportAmount">₹0</span>
            </div>

            <div class="progress-bar">
              <div class="progress-fill transport-fill"></div>
            </div>
          </div>

          <div class="progress-item">
            <div class="progress-label">
              <span>Shopping</span>
              <span id="shoppingAmount">₹0</span>
            </div>

            <div class="progress-bar">
              <div class="progress-fill shopping-fill"></div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <p>Personal Finance Dashboard © 2025</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
